# Vehicle configuration — two-stage rocket
vehicle:
  name: "ExampleLV-1"
  reference_area_m2: 0.785       # pi * (0.5m radius)^2

  stages:
    - id: 1
      name: "First Stage"
      propellant_mass_kg: 18000.0
      dry_mass_kg: 2000.0
      thrust_vac_N: 500000.0
      isp_vac_s: 290.0
      isp_sl_s: 255.0
      burn_time_s: 145.0
      cd_table:                  # [mach, Cd] pairs — interpolated at runtime
        - [0.0, 0.30]
        - [0.8, 0.38]
        - [1.0, 0.48]
        - [1.2, 0.44]
        - [2.0, 0.32]
        - [5.0, 0.25]
      inertia:
        ixx_wet_kg_m2:   800.0    # roll — full propellant
        iyy_wet_kg_m2: 60000.0    # pitch — full propellant
        izz_wet_kg_m2: 60000.0    # yaw  — full propellant
        ixx_dry_kg_m2:   600.0    # roll — dry
        iyy_dry_kg_m2: 20000.0    # pitch — dry
        izz_dry_kg_m2: 20000.0    # yaw  — dry
      gimbal:
        max_deflection_deg: 5.0
        moment_arm_m: 2.0
      aero_moments:
        reference_length_m: 12.0
        cm_alpha_per_rad: -0.5
      attitude_controller:
        kp: 0.005   # ωn = sqrt(kp*T*L/Iyy) ≈ 0.3 rad/s << 1/dt
        kd: 0.03

    - id: 2
      name: "Second Stage"
      propellant_mass_kg: 7500.0
      dry_mass_kg: 600.0
      thrust_vac_N: 65000.0
      isp_vac_s: 340.0
      isp_sl_s: 340.0            # vacuum-only engine
      burn_time_s: 390.0
      cd_table:
        - [0.0, 0.28]
        - [2.0, 0.28]
        - [10.0, 0.28]
      inertia:
        ixx_wet_kg_m2:   200.0
        iyy_wet_kg_m2: 15000.0
        izz_wet_kg_m2: 15000.0
        ixx_dry_kg_m2:   150.0
        iyy_dry_kg_m2:  5000.0
        izz_dry_kg_m2:  5000.0
      gimbal:
        max_deflection_deg: 5.0
        moment_arm_m: 1.0
      aero_moments:
        reference_length_m: 6.0
        cm_alpha_per_rad: -0.3
      attitude_controller:
        kp: 0.02    # ωn = sqrt(kp*T*L/Iyy) ≈ 0.3 rad/s << 1/dt
        kd: 0.08

  payload:
    mass_kg: 300.0
    fairing_mass_kg: 120.0       # jettisoned at fairing_deploy event

  separation:
    spring_impulse_Ns: 500.0     # total ejection impulse
    tip_off_rate_deg_s: 0.5      # worst-case tip-off angular rate
